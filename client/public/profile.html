<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profilo — Agar TCP/UDP</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b17;
      --panel: rgba(12, 18, 34, 0.92);
      --text: #ecf3ff;
      --muted: #9fb2d0;
      --accent: #4ecdc4;
      --danger: #ff6b6b;
      --gold: #ffe66d;
      --line: rgba(255,255,255,.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% 20%, #111a32 0%, #070b17 60%, #04060d 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Arial, sans-serif;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: rgba(12,18,34,.85);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-sm {
      width: 34px; height: 34px; border-radius: 999px;
      background: conic-gradient(from 90deg, #4ecdc4, #54a0ff, #f368e0, #ffe66d, #4ecdc4);
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.18);
    }
    .nav-logo span { font-weight: 800; font-size: 16px; }
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; transition: background .15s, color .15s;
    }
    .nav-links a:hover { background: rgba(255,255,255,.07); color: var(--text); }
    .nav-links a.play {
      background: linear-gradient(135deg, #4ecdc4, #54a0ff);
      color: #061018; padding: 6px 16px;
    }
    .btn-logout { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Layout ────────────────────────────────────────────── */
    main { max-width: 900px; margin: 0 auto; padding: 32px 16px 60px; }
    .page-title { font-size: 26px; font-weight: 800; margin: 0 0 24px; }
    .page-title span { color: var(--accent); }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 18px; padding: 22px 20px; margin-bottom: 20px;
      backdrop-filter: blur(12px);
    }
    .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: .09em; font-weight: 800; color: var(--muted); margin: 0 0 16px; }

    /* ── Stats grid ─────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
    .stat-box { background: rgba(255,255,255,.05); border-radius: 12px; padding: 14px 12px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
    .stat-box.gold .stat-value { color: var(--gold); }

    /* ── Username editor ────────────────────────────────────── */
    .edit-row { display: flex; gap: 10px; align-items: center; }
    .edit-row input {
      flex: 1; border: 1px solid var(--line);
      background: rgba(255,255,255,.07); color: var(--text);
      padding: 10px 12px; border-radius: 10px; outline: none; font-size: 15px;
    }
    .edit-row input:focus { border-color: rgba(78,205,196,.75); box-shadow: 0 0 0 3px rgba(78,205,196,.12); }
    .btn {
      border: 0; color: #061018; font-weight: 700; font-size: 14px;
      border-radius: 10px; padding: 10px 18px;
      background: linear-gradient(135deg, #4ecdc4, #54a0ff);
      cursor: pointer; transition: transform .12s, filter .12s;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; filter: none; }
    .alert {
      margin-top: 10px; padding: 9px 12px; border-radius: 9px; font-size: 13px; display: none;
    }
    .alert.error { background: rgba(255,107,107,.15); border: 1px solid rgba(255,107,107,.3); color: #ff9f9f; }
    .alert.success { background: rgba(29,209,161,.15); border: 1px solid rgba(29,209,161,.3); color: #1dd1a1; }

    /* ── Leaderboard table ──────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; padding: 0 12px 10px; font-weight: 700; }
    td { padding: 10px 12px; border-top: 1px solid var(--line); }
    tr.me td { color: var(--accent); font-weight: 700; }
    .rank { font-weight: 900; color: var(--muted); }
    .rank.top1 { color: #ffe66d; }
    .rank.top2 { color: #b0bec5; }
    .rank.top3 { color: #cd7f32; }
    .loading { color: var(--muted); font-size: 14px; padding: 10px 0; }

    @media (max-width: 500px) {
      .edit-row { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="logo-sm"></div>
      <span>Agar TCP/UDP</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="play">▶ Gioca</a>
      <button class="btn-logout" id="logoutBtn">Esci</button>
    </div>
  </nav>

  <main>
    <h1 class="page-title">Profilo di <span id="usernameTitle">...</span></h1>

    <!-- Statistiche personali -->
    <div class="card">
      <div class="card-title">Le tue statistiche</div>
      <div class="stats-grid" id="statsGrid">
        <div class="loading">Caricamento...</div>
      </div>
    </div>

    <!-- Modifica nickname -->
    <div class="card">
      <div class="card-title">Cambia nickname</div>
      <div class="edit-row">
        <input id="newUsername" type="text" maxlength="32" placeholder="Nuovo nickname..." />
        <button class="btn" id="saveUsernameBtn">Salva</button>
      </div>
      <div id="usernameAlert" class="alert"></div>
    </div>

    <!-- Leaderboard globale -->
    <div class="card">
      <div class="card-title">Classifica globale</div>
      <table id="leaderboardTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Nickname</th>
            <th>Score</th>
            <th>Kill</th>
            <th>Morti</th>
            <th>K/D</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr><td colspan="6" class="loading">Caricamento classifica...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    // ── Auth guard: se non loggato, vai al login ──────────────────────────────
    const token = localStorage.getItem('agar_token');
    const myUsername = localStorage.getItem('agar_username') || '';
    if (!token) { window.location.href = 'login.html'; }

    // ── Helper API con JWT ───────────────────────────────────────────────────
    async function apiFetch(url, opts = {}) {
      const res = await fetch(url, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
          ...(opts.headers || {}),
        },
      });
      return { ok: res.ok, status: res.status, data: await res.json() };
    }

    // ── Logout ───────────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('agar_token');
      localStorage.removeItem('agar_username');
      window.location.href = 'login.html';
    });

    // ── Carica profilo ────────────────────────────────────────────────────────
    async function loadProfile() {
      const { ok, status, data } = await apiFetch('/api/profile');
      if (!ok) {
        if (status === 401) { window.location.href = 'login.html'; return; }
        document.getElementById('statsGrid').innerHTML = '<div class="loading" style="color:var(--danger)">Errore caricamento profilo.</div>';
        return;
      }

      document.getElementById('usernameTitle').textContent = data.username;
      document.getElementById('newUsername').value = data.username;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-box gold">
          <div class="stat-value">${data.highestScore.toLocaleString()}</div>
          <div class="stat-label">Score massimo</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${data.killCount}</div>
          <div class="stat-label">Kill totali</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${data.deathCount}</div>
          <div class="stat-label">Morti totali</div>
        </div>
        <div class="stat-box">
          <div class="stat-value">${data.kd}</div>
          <div class="stat-label">K/D Ratio</div>
        </div>
      `;
    }

    // ── Salva nuovo username ─────────────────────────────────────────────────
    document.getElementById('saveUsernameBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveUsernameBtn');
      const alertEl = document.getElementById('usernameAlert');
      const newUsername = document.getElementById('newUsername').value.trim();
      btn.disabled = true;

      const { ok, data } = await apiFetch('/api/profile/username', {
        method: 'PATCH',
        body: JSON.stringify({ username: newUsername }),
      });

      btn.disabled = false;
      if (!ok) {
        alertEl.textContent = data.error || 'Errore';
        alertEl.className = 'alert error';
        alertEl.style.display = 'block';
        return;
      }

      // Aggiorna localStorage con il nuovo username
      localStorage.setItem('agar_username', data.username);
      document.getElementById('usernameTitle').textContent = data.username;
      alertEl.textContent = 'Nickname aggiornato!';
      alertEl.className = 'alert success';
      alertEl.style.display = 'block';
      setTimeout(() => { alertEl.style.display = 'none'; }, 3000);
    });

    // ── Carica leaderboard (API pubblica) ────────────────────────────────────
    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard?limit=15');
      const rows = await res.json();
      const tbody = document.getElementById('leaderboardBody');

      if (!Array.isArray(rows) || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="loading">Nessun giocatore in classifica.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map((r, i) => {
        const pos = i + 1;
        const rankClass = pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';
        const kd = r.DeathCount > 0
          ? (r.KillCount / r.DeathCount).toFixed(2)
          : r.KillCount.toFixed(2);
        const isMe = r.Username === myUsername;
        return `<tr class="${isMe ? 'me' : ''}">
          <td><span class="rank ${rankClass}">${pos}</span></td>
          <td>${escHtml(r.Username)}${isMe ? ' ★' : ''}</td>
          <td>${r.HighestScore.toLocaleString()}</td>
          <td>${r.KillCount}</td>
          <td>${r.DeathCount}</td>
          <td>${kd}</td>
        </tr>`;
      }).join('');
    }

    // ── Escaping XSS per output HTML dinamico ────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    loadProfile();
    loadLeaderboard();
  </script>
</body>
</html>
